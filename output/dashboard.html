<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honda Lease vs Finance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text: #1a1a18;
    --text-muted: #6b6b67;
    --text-faint: #9b9b97;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --teal: #1D9E75;
    --teal-bg: #E1F5EE;
    --teal-text: #085041;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --red: #E24B4A;
    --green: #0F6E56;
    --radius: 10px;
    --radius-sm: 6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --bg-secondary: #242422;
      --bg-tertiary: #2e2e2b;
      --text: #f0efea;
      --text-muted: #9b9b97;
      --text-faint: #6b6b67;
      --border: rgba(255,255,255,0.1);
      --border-mid: rgba(255,255,255,0.18);
      --blue-bg: #0C447C;
      --blue-text: #B5D4F4;
      --teal-bg: #085041;
      --teal-text: #9FE1CB;
      --amber-bg: #633806;
      --amber-text: #FAC775;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 28px; height: 28px;
    background: var(--text);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-logo svg { width: 16px; height: 16px; fill: var(--bg); }
  .header-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text-muted); }

  .header-controls { display: flex; gap: 10px; align-items: center; }
  .header-controls label { font-size: 12px; color: var(--text-muted); }
  select {
    font-size: 13px;
    padding: 5px 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-mid);
    background: var(--bg-secondary);
    color: var(--text);
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--blue); }

  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

  .verdict-bar {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .verdict-left { display: flex; align-items: baseline; gap: 10px; }
  .verdict-label { font-size: 13px; color: var(--text-muted); }
  .verdict-winner { font-size: 22px; font-weight: 700; color: var(--green); }
  .verdict-saves { font-size: 13px; color: var(--text-muted); }
  .verdict-saves strong { color: var(--green); font-weight: 600; }
  .verdict-right { display: flex; gap: 2rem; }
  .verdict-stat { text-align: right; }
  .verdict-stat-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .04em; }
  .verdict-stat-val { font-size: 16px; font-weight: 600; }

  .grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }

  .metric {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    margin-bottom: 1.25rem;
  }
  .card.winner { border: 1.5px solid var(--teal); }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
  }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-teal { background: var(--teal-bg); color: var(--teal-text); }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    font-size: 12px;
    gap: 8px;
  }
  .row:last-child { border-bottom: none; }
  .row-label { color: var(--text-muted); }
  .row-val { font-weight: 500; text-align: right; }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin: 10px 0 6px;
  }
  .divider { height: 0.5px; background: var(--border); margin: 10px 0; }

  .chart-wrap { position: relative; width: 100%; height: 260px; }

  .legend { display: flex; gap: 18px; margin-bottom: 14px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 20px; height: 2px; border-radius: 1px; }
  .legend-dashed { width: 20px; border-top: 2px dashed var(--teal); }

  table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  thead tr { border-bottom: 0.5px solid var(--border-mid); }
  th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  th:not(:first-child) { text-align: right; }
  td { padding: 7px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: top; }
  td:not(:first-child) { text-align: right; }
  tr:last-child td { border-bottom: none; }
  .td-bold { font-weight: 600; }
  .td-green { color: var(--green); font-weight: 600; }
  .td-red { color: var(--red); font-weight: 600; }
  .td-sub { font-size: 10px; color: var(--text-faint); font-weight: 400; }

  .note { font-size: 11px; color: var(--text-faint); margin-top: 8px; }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 11px;
    color: var(--text-faint);
    border-top: 0.5px solid var(--border);
    margin-top: 1rem;
  }

  @media (max-width: 600px) {
    header { padding: 0 1rem; flex-wrap: wrap; height: auto; padding: 10px 1rem; gap: 8px; }
    main { padding: 1rem; }
    .verdict-bar { flex-direction: column; }
    .verdict-right { justify-content: flex-start; }
  }
</style>
</head>

<header>

const pct = v => (v * 100).toFixed(2) + '%';

const models = [...new Set(LEASE.map(r => r.Model))];

const selScenario = document.getElementById('sel-scenario');

models.forEach(m => {

  selModel.appendChild(o);
});

function populateScenarios(model) {

  LEASE.filter(r => r.Model === model).forEach(r => {
    const o = document.createElement('option');
    o.value = r.Scenario; o.textContent = r.Scenario;
    selScenario.appendChild(o);
  });
}

        </div>
        <div class="row"><span class="row-label">Monthly payment</span><span class="row-val">${$2(L.L1_Monthly)}</span></div>
        <div class="row"><span class="row-label">Pre-tax monthly</span><span class="row-val">${$2(L.L1_PreTax)}</span></div>
        <div class="row"><span class="row-label">Annual mileage</span><span class="row-val">${L.L1_Miles.toLocaleString()} mi</span></div>
        <div class="row"><span class="row-label">Money factor</span><span class="row-val">${L.L1_MF.toFixed(5)}</span></div>
        <div class="divider"></div>
        <div class="section-label">Due at signing — ${$2(L.L1_Signing)}</div>
        <div class="row"><span class="row-label">Down payment</span><span class="row-val">${$2(L.L1_Down)}</span></div>
        <div class="row"><span class="row-label">Acquisition fee</span><span class="row-val">${$2(L.L1_Acq)}</span></div>
        <div class="row"><span class="row-label">First month</span><span class="row-val">${$2(L.L1_FirstMo)}</span></div>
        <div class="row"><span class="row-label">Monthly sales tax</span><span class="row-val">${$2(L.L1_MonthTax)}/mo</span></div>
        <div class="row"><span class="row-label">Upfront sales tax</span><span class="row-val">${$2(L.L1_UpfrontTax)}</span></div>
        <div class="divider"></div>
        <div class="row"><span class="row-label" style="font-weight:600">3-year total</span><span class="row-val" style="font-size:14px">${$(L.L1_3yr)}</span></div>
      </div>

      <div class="card">
        <div class="card-title">
          Lease cycle 2 <span style="font-weight:400;color:var(--text-muted)">(projected)</span>
          <span class="badge badge-amber">Months 37–72</span>
        </div>
        <p style="font-size:11px;color:var(--text-faint);margin:-6px 0 10px">4% MSRP inflation · same residual % + money factor</p>
        <div class="row"><span class="row-label">Future MSRP</span><span class="row-val">${$(L.L2_MSRP)}</span></div>
        <div class="row"><span class="row-label">Future residual</span><span class="row-val">${$(L.L2_Residual)}</span></div>
        <div class="row"><span class="row-label">Monthly payment</span><span class="row-val">${$2(L.L2_Monthly)}</span></div>
        <div class="row"><span class="row-label">Due at signing</span><span class="row-val">${$2(L.L2_Signing)}</span></div>
        <div class="divider"></div>
        <div class="row"><span class="row-label" style="font-weight:600">3-year total</span><span class="row-val" style="font-size:14px">${$(L.L2_3yr)}</span></div>
        <div class="divider"></div>
        <div class="row"><span class="row-label" style="font-weight:600">Lease 6-year total</span><span class="row-val" style="font-size:15px">${$(L.Lease6yr)}</span></div>
        <p class="note">Own nothing at end of year 6</p>
      </div>
    </div>

    <div class="card ${finWins ? 'winner' : ''}">
      <div class="card-title">
        Finance
        ${finWins ? '<span class="badge badge-teal">lower net cost</span>' : ''}
        <span class="badge badge-blue">${F.Term}-month loan · ${F.APR}% APR</span>
      </div>
      <div class="grid4" style="margin-bottom:0">
        <div class="metric"><div class="metric-label">Monthly</div><div class="metric-value" style="font-size:18px">${$2(F.Monthly)}</div></div>
        <div class="metric"><div class="metric-label">Amount financed</div><div class="metric-value" style="font-size:18px">${$(F.AmtFinanced)}</div></div>
        <div class="metric"><div class="metric-label">Due at signing</div><div class="metric-value" style="font-size:18px">${$(F.Signing)}</div></div>
        <div class="metric"><div class="metric-label">Est. resale (yr 6)</div><div class="metric-value" style="font-size:18px">${$(F.Resale)}</div><div class="metric-sub">40% of MSRP</div></div>
      </div>
      <div class="divider"></div>
      <div class="row"><span class="row-label">Gross paid over ${F.Term} months</span><span class="row-val">${$(F.Gross)}</span></div>
      <div class="row"><span class="row-label">Minus estimated resale value</span><span class="row-val">− ${$(F.Resale)}</span></div>
      <div class="row"><span class="row-label" style="font-weight:600">Net cost</span><span class="row-val" style="font-size:15px">${$(F.Net)}</span></div>
    </div>

    <div class="card">
      <div class="card-title">Cumulative spend — year by year</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-line" style="background:var(--blue)"></div><span>Lease</span></div>
        <div class="legend-item"><div class="legend-dashed"></div><span>Finance (gross)</span></div>
      </div>
      <div class="chart-wrap">
        <canvas id="cumul-chart" role="img" aria-label="Line chart of cumulative lease vs finance spend over 6 years">Cumulative spend data.</canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Annual breakdown</div>
      <div style="overflow-x:auto">
        <table>
          <colgroup><col style="width:70px"><col style="width:90px"><col style="width:105px"><col style="width:95px"><col style="width:105px"><col style="width:130px"></colgroup>
          <thead><tr>
            <th>Year</th><th style="text-align:right">Lease/mo</th><th style="text-align:right">Lease total</th>
            <th style="text-align:right">Finance/mo</th><th style="text-align:right">Finance total</th><th style="text-align:right">Difference</th>
          </tr></thead>
          <tbody>${S.rows.map(r => {
            const leaseMore = r.diff > 0;
            return `<tr>
              <td class="td-bold">Yr ${r.y}${r.y===4 ? '<br><span class="td-sub" style="color:var(--amber-text)">new lease</span>' : ''}${r.y===6 ? '<br><span class="td-sub" style="color:var(--blue-text)">loan done</span>' : ''}</td>
              <td>${$2(r.lmo)}</td>
              <td class="td-bold">${$(r.lcum)}</td>
              <td>${r.fmo === 0 ? '<span style="color:var(--text-faint)">—</span>' : $2(r.fmo)}</td>
              <td class="td-bold">${$(r.fcum)}</td>
              <td class="${leaseMore ? 'td-red' : 'td-green'}">${leaseMore ? '+' : '-'}${$(r.diff)}<br><span class="td-sub">${leaseMore ? 'lease ahead' : 'finance ahead'}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
      <p class="note">Difference = lease cumulative minus finance cumulative. Negative means finance has spent more to that point (before accounting for resale).</p>
    </div>
  `;

  if (chartInst) { chartInst.destroy(); chartInst = null; }
  chartInst = new Chart(document.getElementById('cumul-chart'), {
    type: 'line',
    data: {
      labels: S.rows.map(r => 'Yr ' + r.y),
      datasets: [
        {label:'Lease',data:S.rows.map(r=>Math.round(r.lcum)),borderColor:'#378ADD',backgroundColor:'rgba(55,138,221,0.07)',fill:true,tension:0.35,pointRadius:4,pointBackgroundColor:'#378ADD',borderWidth:2,borderDash:[]},
        {label:'Finance (gross)',data:S.rows.map(r=>Math.round(r.fcum)),borderColor:'#1D9E75',backgroundColor:'transparent',fill:false,tension:0.35,pointRadius:4,pointBackgroundColor:'#1D9E75',borderWidth:2,borderDash:[6,3]},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': $'+ctx.parsed.y.toLocaleString()}}},
      scales:{
        y:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',color:'#888780',font:{size:11}},grid:{color:'rgba(136,135,128,0.1)'}},
        x:{ticks:{color:'#888780',font:{size:11},autoSkip:false},grid:{display:false}}
      }
    }
  });
}

selModel.addEventListener('change', () => { populateScenarios(selModel.value); render(); });
selScenario.addEventListener('change', render);
render();
</script>
</body>
</html>
