<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honda Lease vs Finance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg-secondary: #f5f5f3; --bg-tertiary: #eeede9;
    --text: #1a1a18; --text-muted: #6b6b67; --text-faint: #9b9b97;
    --border: rgba(0,0,0,0.1); --border-mid: rgba(0,0,0,0.18);
    --blue: #378ADD; --blue-bg: #E6F1FB; --blue-text: #0C447C;
    --teal: #1D9E75; --teal-bg: #E1F5EE; --teal-text: #085041;
    --amber-bg: #FAEEDA; --amber-text: #633806;
    --red: #E24B4A; --green: #0F6E56;
    --radius: 10px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg-secondary: #242422; --bg-tertiary: #2e2e2b;
      --text: #f0efea; --text-muted: #9b9b97; --text-faint: #6b6b67;
      --border: rgba(255,255,255,0.1); --border-mid: rgba(255,255,255,0.18);
      --blue-bg: #0C447C; --blue-text: #B5D4F4;
      --teal-bg: #085041; --teal-text: #9FE1CB;
      --amber-bg: #633806; --amber-text: #FAC775;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-tertiary); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  header { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; gap: 1rem; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-size: 14px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-muted); }
  .header-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .header-controls label { font-size: 12px; color: var(--text-muted); }
  select { font-size: 13px; padding: 5px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-mid); background: var(--bg-secondary); color: var(--text); cursor: pointer; outline: none; }
  select:focus { border-color: var(--blue); }
  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
  .loading { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 14px; }
  .error { background: #FCEBEB; color: #791F1F; border-radius: var(--radius); padding: 1rem 1.25rem; font-size: 13px; }
  .verdict-bar { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
  .verdict-winner { font-size: 22px; font-weight: 700; color: var(--green); }
  .verdict-label { font-size: 13px; color: var(--text-muted); }
  .verdict-saves { font-size: 13px; color: var(--text-muted); }
  .verdict-saves strong { color: var(--green); font-weight: 600; }
  .verdict-right { display: flex; gap: 2rem; flex-wrap: wrap; }
  .verdict-stat-label { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .04em; }
  .verdict-stat-val { font-size: 16px; font-weight: 600; }
  .grid4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .grid2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 1.25rem; }
  .metric { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .metric-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .03em; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; }
  .card.winner { border: 1.5px solid var(--teal); }
  .card-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-teal { background: var(--teal-bg); color: var(--teal-text); }
  .row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; gap: 8px; }
  .row:last-child { border-bottom: none; }
  .row-label { color: var(--text-muted); }
  .row-val { font-weight: 500; text-align: right; }
  .section-label { font-size: 10px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .05em; margin: 10px 0 6px; }
  .divider { height: 0.5px; background: var(--border); margin: 10px 0; }
  .chart-wrap { position: relative; width: 100%; height: 260px; }
  .legend { display: flex; gap: 18px; margin-bottom: 14px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-line { width: 20px; height: 2px; border-radius: 1px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
  thead tr { border-bottom: 0.5px solid var(--border-mid); }
  th { text-align: left; padding: 6px 8px; color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; }
  th:not(:first-child) { text-align: right; }
  td { padding: 7px 8px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: top; }
  td:not(:first-child) { text-align: right; }
  tr:last-child td { border-bottom: none; }
  .td-bold { font-weight: 600; }
  .td-green { color: var(--green); font-weight: 600; }
  .td-red { color: var(--red); font-weight: 600; }
  .td-sub { font-size: 10px; color: var(--text-faint); font-weight: 400; }
  .note { font-size: 11px; color: var(--text-faint); margin-top: 8px; }
  footer { text-align: center; padding: 2rem; font-size: 11px; color: var(--text-faint); border-top: 0.5px solid var(--border); margin-top: 1rem; }
  @media (max-width: 600px) { header { height: auto; padding: 10px 1rem; } main { padding: 1rem; } }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div>
      <div class="header-title">Honda Lease vs Finance</div>
      <div class="header-sub">6-year cost analysis · ZIP 90250</div>
    </div>
  </div>
  <div class="header-controls">
    <div><label for="sel-model">Model&nbsp;</label><select id="sel-model"></select></div>
    <div><label for="sel-scenario">Scenario&nbsp;</label><select id="sel-scenario"></select></div>
  </div>
</header>

<main id="main"><div class="loading">Loading data…</div></main>

<footer>Data pulled live from Honda API · Lease cycle 2 projected at 4% MSRP inflation · Resale estimated at 40% of MSRP at year 6 · Not financial advice.</footer>

<script>
const $ = v => '$' + Math.round(Math.abs(v)).toLocaleString();
const $2 = v => '$' + Number(v).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const pct = v => (v * 100).toFixed(2) + '%';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/\r/g, ''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQuote = false;
    for (const ch of line) {
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { vals.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    vals.push(cur.trim().replace(/\r/g, ''));
    const obj = {};
    headers.forEach((h, i) => {
      const v = vals[i] ?? '';
      obj[h] = isNaN(v) || v === '' ? v : parseFloat(v);
    });
    return obj;
  });
}

async function loadCSVs() {
  const [leaseText, financeText, schedText] = await Promise.all([
    fetch('lease_data.csv').then(r => r.text()),
    fetch('finance_data.csv').then(r => r.text()),
    fetch('yearly_schedule.csv').then(r => r.text()),
  ]);
  return {
    lease: parseCSV(leaseText),
    finance: parseCSV(financeText),
    schedule: parseCSV(schedText),
  };
}

let DATA = null;
let chartInst = null;

function populateSelectors() {
  const selModel = document.getElementById('sel-model');
  const selScenario = document.getElementById('sel-scenario');
  const models = [...new Set(DATA.lease.map(r => r.Model))];
  selModel.innerHTML = '';
  models.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; selModel.appendChild(o); });
  populateScenarios(models[0]);
  selModel.addEventListener('change', () => { populateScenarios(selModel.value); render(); });
  selScenario.addEventListener('change', render);
}

function populateScenarios(model) {
  const selScenario = document.getElementById('sel-scenario');
  selScenario.innerHTML = '';
  DATA.lease.filter(r => r.Model === model).forEach(r => {
    const o = document.createElement('option'); o.value = r.Scenario; o.textContent = r.Scenario;
    selScenario.appendChild(o);
  });
}

function render() {
  const model = document.getElementById('sel-model').value;
  const scenario = document.getElementById('sel-scenario').value;
  const L = DATA.lease.find(r => r.Model === model && r.Scenario === scenario);
  const F = DATA.finance.find(r => r.Model === model && r.Scenario === scenario);
  const sRows = DATA.schedule.filter(r => r.Model === model && r.Scenario === scenario).sort((a,b) => a.Year - b.Year);
  if (!L || !F || !sRows.length) return;

  const finWins = F.F_NetTotal < L.Lease_6YrTotal;
  const savings = Math.abs(L.Lease_6YrTotal - F.F_NetTotal);
  const leaseAPR = (L.L1_MoneyFactor * 2400).toFixed(2);
  const aprDiff = (F.F_APR - parseFloat(leaseAPR)).toFixed(2);

  document.getElementById('main').innerHTML = `
    <div class="verdict-bar">
      <div>
        <div class="verdict-label">Lower 6-year cost</div>
        <div class="verdict-winner">${finWins ? 'Finance' : 'Lease'}</div>
        <div class="verdict-saves">saves <strong>${$(savings)}</strong> vs ${finWins ? 'leasing' : 'financing'}</div>
      </div>
      <div class="verdict-right">
        <div>
          <div class="verdict-stat-label">Lease 6yr total</div>
          <div class="verdict-stat-val">${$(L.Lease_6YrTotal)}</div>
        </div>
        <div>
          <div class="verdict-stat-label">Finance net</div>
          <div class="verdict-stat-val">${$(F.F_NetTotal)}</div>
        </div>
        <div>
          <div class="verdict-stat-label">Finance gross</div>
          <div class="verdict-stat-val">${$(F.F_GrossTotal)}</div>
        </div>
      </div>
    </div>

    <div class="grid4">
      <div class="metric"><div class="metric-label">MSRP</div><div class="metric-value">${$(L.MSRP)}</div></div>
      <div class="metric"><div class="metric-label">Residual value</div><div class="metric-value">${$(L.ResidualValue)}</div><div class="metric-sub">${pct(L.ResidualPct)} of MSRP</div></div>
      <div class="metric"><div class="metric-label">Money factor</div><div class="metric-value">${L.L1_MoneyFactor.toFixed(5)}</div><div class="metric-sub">${leaseAPR}% APR equiv.</div></div>
      <div class="metric"><div class="metric-label">Finance APR</div><div class="metric-value">${F.F_APR}%</div><div class="metric-sub">${aprDiff > 0 ? '+' : ''}${aprDiff}% vs lease MF</div></div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Lease cycle 1 <span class="badge badge-blue">Months 1–36</span></div>
        <div class="row"><span class="row-label">Monthly payment</span><span class="row-val">${$2(L.L1_MonthlyPayment)}</span></div>
        <div class="row"><span class="row-label">Pre-tax monthly</span><span class="row-val">${$2(L.L1_PreTaxMonthly)}</span></div>
        <div class="row"><span class="row-label">Annual mileage</span><span class="row-val">${L.L1_AnnualMileage.toLocaleString()} mi</span></div>
        <div class="row"><span class="row-label">Money factor</span><span class="row-val">${L.L1_MoneyFactor.toFixed(5)}</span></div>
        <div class="divider"></div>
        <div class="section-label">Due at signing — ${$2(L.L1_TotalDueAtSigning)}</div>
        <div class="row"><span class="row-label">Down payment</span><span class="row-val">${$2(L.L1_DownPayment)}</span></div>
        <div class="row"><span class="row-label">Acquisition fee</span><span class="row-val">${$2(L.L1_AcquisitionFee)}</span></div>
        <div class="row"><span class="row-label">First month</span><span class="row-val">${$2(L.L1_FirstMonthPayment)}</span></div>
        <div class="row"><span class="row-label">Monthly sales tax</span><span class="row-val">${$2(L.L1_MonthlySalesTax)}/mo</span></div>
        <div class="row"><span class="row-label">Upfront sales tax</span><span class="row-val">${$2(L.L1_UpfrontSalesTax)}</span></div>
        <div class="divider"></div>
        <div class="row"><span class="row-label" style="font-weight:600">3-year total</span><span class="row-val" style="font-size:14px">${$(L.L1_3YrTotal)}</span></div>
      </div>

      <div class="card">
        <div class="card-title">Lease cycle 2 <span style="font-weight:400;color:var(--text-muted)">(projected)</span> <span class="badge badge-amber">Months 37–72</span></div>
        <p style="font-size:11px;color:var(--text-faint);margin:-6px 0 10px">4% MSRP inflation · same residual % + money factor</p>
        <div class="row"><span class="row-label">Future MSRP</span><span class="row-val">${$(L.L2_FutureMSRP)}</span></div>
        <div class="row"><span class="row-label">Future residual</span><span class="row-val">${$(L.L2_FutureResidual)}</span></div>
        <div class="row"><span class="row-label">Monthly payment</span><span class="row-val">${$2(L.L2_MonthlyPayment)}</span></div>
        <div class="row"><span class="row-label">Due at signing</span><span class="row-val">${$2(L.L2_TotalDueAtSigning)}</span></div>
        <div class="divider"></div>
        <div class="row"><span class="row-label" style="font-weight:600">3-year total</span><span class="row-val" style="font-size:14px">${$(L.L2_3YrTotal)}</span></div>
        <div class="divider"></div>
        <div class="row"><span class="row-label" style="font-weight:600">Lease 6-year total</span><span class="row-val" style="font-size:15px">${$(L.Lease_6YrTotal)}</span></div>
        <p class="note">Own nothing at end of year 6</p>
      </div>
    </div>

    <div class="card ${finWins ? 'winner' : ''}">
      <div class="card-title">Finance ${finWins ? '<span class="badge badge-teal">lower net cost</span>' : ''} <span class="badge badge-blue">${F.F_Term}-month loan · ${F.F_APR}% APR</span></div>
      <div class="grid4" style="margin-bottom:0">
        <div class="metric"><div class="metric-label">Monthly</div><div class="metric-value" style="font-size:18px">${$2(F.F_MonthlyPayment)}</div></div>
        <div class="metric"><div class="metric-label">Amount financed</div><div class="metric-value" style="font-size:18px">${$(F.F_AmountFinanced)}</div></div>
        <div class="metric"><div class="metric-label">Due at signing</div><div class="metric-value" style="font-size:18px">${$(F.F_TotalDueAtSigning)}</div></div>
        <div class="metric"><div class="metric-label">Est. resale (yr 6)</div><div class="metric-value" style="font-size:18px">${$(F.F_EstimatedResale)}</div><div class="metric-sub">40% of MSRP</div></div>
      </div>
      <div class="divider"></div>
      <div class="row"><span class="row-label">Gross paid over ${F.F_Term} months</span><span class="row-val">${$(F.F_GrossTotal)}</span></div>
      <div class="row"><span class="row-label">Minus estimated resale</span><span class="row-val">− ${$(F.F_EstimatedResale)}</span></div>
      <div class="row"><span class="row-label" style="font-weight:600">Net cost</span><span class="row-val" style="font-size:15px">${$(F.F_NetTotal)}</span></div>
    </div>

    <div class="card">
      <div class="card-title">Cumulative spend — year by year</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-line" style="background:#378ADD"></div><span>Lease</span></div>
        <div class="legend-item"><div style="width:20px;border-top:2px dashed #1D9E75"></div><span>Finance (gross)</span></div>
      </div>
      <div class="chart-wrap"><canvas id="cumul-chart" role="img" aria-label="Cumulative lease vs finance spend over 6 years">Chart data.</canvas></div>
    </div>

    <div class="card">
      <div class="card-title">Annual breakdown</div>
      <div style="overflow-x:auto">
        <table>
          <colgroup><col style="width:70px"><col style="width:90px"><col style="width:105px"><col style="width:95px"><col style="width:105px"><col style="width:130px"></colgroup>
          <thead><tr>
            <th>Year</th><th style="text-align:right">Lease/mo</th><th style="text-align:right">Lease total</th>
            <th style="text-align:right">Finance/mo</th><th style="text-align:right">Finance total</th><th style="text-align:right">Difference</th>
          </tr></thead>
          <tbody>${sRows.map(r => {
            const leaseMore = r.Difference_LeaseMinusFinance > 0;
            return `<tr>
              <td class="td-bold">Yr ${r.Year}${r.Year===4?'<br><span class="td-sub" style="color:var(--amber-text)">new lease</span>':''}${r.Year===6?'<br><span class="td-sub" style="color:var(--blue-text)">loan done</span>':''}</td>
              <td>${$2(r.LeaseMonthly)}</td>
              <td class="td-bold">${$(r.LeaseCumulative)}</td>
              <td>${r.FinanceMonthly === 0 ? '<span style="color:var(--text-faint)">—</span>' : $2(r.FinanceMonthly)}</td>
              <td class="td-bold">${$(r.FinanceCumulative)}</td>
              <td class="${leaseMore ? 'td-red' : 'td-green'}">${leaseMore ? '+' : '-'}${$(r.Difference_LeaseMinusFinance)}<br><span class="td-sub">${leaseMore ? 'lease ahead' : 'finance ahead'}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
      <p class="note">Difference = lease cumulative minus finance cumulative. Negative means finance has spent more to that point (before resale).</p>
    </div>
  `;

  if (chartInst) { chartInst.destroy(); chartInst = null; }
  chartInst = new Chart(document.getElementById('cumul-chart'), {
    type: 'line',
    data: {
      labels: sRows.map(r => 'Yr ' + r.Year),
      datasets: [
        { label:'Lease', data:sRows.map(r=>Math.round(r.LeaseCumulative)), borderColor:'#378ADD', backgroundColor:'rgba(55,138,221,0.07)', fill:true, tension:0.35, pointRadius:4, pointBackgroundColor:'#378ADD', borderWidth:2 },
        { label:'Finance (gross)', data:sRows.map(r=>Math.round(r.FinanceCumulative)), borderColor:'#1D9E75', backgroundColor:'transparent', fill:false, tension:0.35, pointRadius:4, pointBackgroundColor:'#1D9E75', borderWidth:2, borderDash:[6,3] },
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': $'+ctx.parsed.y.toLocaleString()}} },
      scales:{
        y:{ ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k',color:'#888780',font:{size:11}}, grid:{color:'rgba(136,135,128,0.1)'} },
        x:{ ticks:{color:'#888780',font:{size:11},autoSkip:false}, grid:{display:false} }
      }
    }
  });
}

(async () => {
  try {
    DATA = await loadCSVs();
    populateSelectors();
    render();
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="error"><strong>Could not load CSV files.</strong><br>Make sure lease_data.csv, finance_data.csv, and yearly_schedule.csv are in the same folder as dashboard.html.<br><br>Error: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
